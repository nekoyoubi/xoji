<div class="xoji-alert" part="alert" role="status" aria-live="polite" tabindex="-1" data-root data-alert>
	<span class="xoji-alert__icon" part="icon" aria-hidden="true"><slot name="icon"><span data-icon></span></slot></span>
	<div class="xoji-alert__body" part="body">
		<div class="xoji-alert__title" part="title"><slot name="title"></slot></div>
		<div class="xoji-alert__message" part="message"><slot></slot></div>
		<div class="xoji-alert__actions" part="actions"><slot name="actions"></slot></div>
	</div>
	<span class="xoji-alert__dismiss-slot" data-dismiss></span>
</div>
