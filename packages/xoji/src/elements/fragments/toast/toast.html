<div class="xoji-toast" part="toast" role="status" aria-live="polite" aria-atomic="true" data-root data-toast>
	<span class="xoji-toast__icon" part="icon" aria-hidden="true"><slot name="icon"><span data-icon></span></slot></span>
	<div class="xoji-toast__body" part="body">
		<span class="xoji-toast__message" part="message"><slot></slot></span>
		<span class="xoji-toast__action-slot" data-action></span>
	</div>
	<span class="xoji-toast__close-slot" data-close></span>
</div>
